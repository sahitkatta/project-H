# Build from repo root: ./deploy/standalone/build.sh
# Or: docker compose -f deploy/standalone/docker-compose.yml build
# Run: docker compose -f deploy/standalone/docker-compose.yml --env-file deploy/standalone/.env up
#
# DATABASE_URL: use Supabase Session pooler in .env if direct db.*.supabase.co fails (IPv6). See .env.example.
services:
  app:
    image: projecth-app:local
    build:
      context: ../..
      dockerfile: deploy/standalone/Dockerfile
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env or the shell}
